<!DOCTYPE html>
<html>
<head>
    <title>Launching...</title>
</head>
<body style="background-color: black; color: white; text-align: center; padding-top: 50px;">

    <button onclick="runBlankCloak()" style="padding: 10px 20px; font-size: 16px;">Launch Game</button>

    <script>
        function runBlankCloak() {
            const gameUrl = "https://truffled.lol/games/YOMIHustle/";
            
            const pageContent = `
                <!DOCTYPE html>
                <html>
                <head>
                    <title>Google Drive</title>
                </head>
                <body style="margin: 0; padding: 0; overflow: hidden; background-color: black;">
                    <iframe src="${gameUrl}" style="width: 100vw; height: 100vh; border: none;" allow="fullscreen; keyboard"></iframe>
                </body>
                </html>
            `;

            // Open a blank tab
            const newWindow = window.open('about:blank', '_blank');
            
            // Check if popup was allowed
            if (newWindow) {
                // Write the code directly into the new window
                newWindow.document.write(pageContent);
                newWindow.document.close();
                
                // Now it's safe to immediately navigate back, no delay needed
                window.history.back();
            } else {
                alert("Popup blocked! Please allow popups for this site.");
            }
        }
    </script>
</body>
</html>
