<!DOCTYPE html>
<html>
<head>
    <title>Launching...</title>
</head>
<body style="background-color: black;">
    <script>
        function runBlobCloak() {
            // The target game link
            const gameUrl = "https://truffled.lol/games/YOMIHustle/";
            
            // We build the entire hidden webpage inside this string
            const pageContent = `
                <!DOCTYPE html>
                <html>
                <head>
                    <title>Google Drive</title>
                </head>
                <body style="margin: 0; padding: 0; overflow: hidden; background-color: black;">
                    <iframe src="${gameUrl}" style="width: 100vw; height: 100vh; border: none;" allow="fullscreen; keyboard"></iframe>
                </body>
                </html>
            `;

            // Convert our string into a temporary memory file (Blob)
            const blobData = new Blob([pageContent], { type: 'text/html' });
            const temporaryUrl = URL.createObjectURL(blobData);

            // Open our untrackable memory file in a new tab
            window.open(temporaryUrl, '_blank');
            
            // Instantly send the original tab back to your Google Site
            window.history.back();
        }

        // Run the new cloak
        runBlobCloak();
    </script>
</body>
</html>
